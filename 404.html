<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página no encontrada - Proyecto Panda Rojo">
    <title>404 - Página no encontrada | Proyecto Panda Rojo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        .error-page {
            min-height: 100vh;
            background-color: #fdfbf7; 
        }
        .error-card {
            max-width: 550px;
        }
        .panda-icon {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
<main class="error-page d-flex align-items-center justify-content-center p-3">
        <div class="error-card text-center bg-white p-5 rounded-4 shadow-sm border">
            <div class="panda-icon text-danger mb-4" aria-hidden="true">🐾</div>
            
            <h1 class="display-1 fw-bold text-danger">404</h1>
            <h2 class="fw-bold h4 mb-3 text-dark">¡Oh no! Página no encontrada!</h2>
            
            <p class="text-muted mb-4">
                La página que estás buscando no existe, ha sido movida o el enlace es incorrecto. 
                Acompáñanos de vuelta al bosque seguro.
            </p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="/" class="btn btn-danger btn-lg px-4 shadow-sm">
                    <i class="fa-solid fa-house me-2" aria-hidden="true"></i> Volver al Inicio
                </a>
            </div>
        </div>
    </main>
</body>
</html>
